# =============================================================================
# Nginx Configuration for DnnMigration Angular 19 SPA
# =============================================================================
# This configuration provides:
# - SPA routing with fallback to index.html for client-side Angular routing
# - API proxy pass to backend ASP.NET Core 8 BFF service
# - Static asset caching with immutable headers for optimal performance
# - Gzip compression for reduced bandwidth
# - Security headers for protection against common attacks
# - WebSocket support for real-time communication if needed
# =============================================================================

# Automatically set the number of worker processes based on CPU cores
worker_processes auto;

# Error log configuration
error_log /var/log/nginx/error.log warn;

# Process ID file location
pid /var/run/nginx.pid;

# =============================================================================
# Events Block - Connection handling settings
# =============================================================================
events {
    # Maximum simultaneous connections per worker process
    worker_connections 1024;
    
    # Accept multiple connections at once
    multi_accept on;
    
    # Use epoll on Linux for better performance
    use epoll;
}

# =============================================================================
# HTTP Block - Main HTTP server configuration
# =============================================================================
http {
    # Include MIME types mapping
    include /etc/nginx/mime.types;
    
    # Default MIME type for unknown file extensions
    default_type application/octet-stream;

    # ==========================================================================
    # Logging Configuration
    # ==========================================================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # ==========================================================================
    # Performance Optimizations
    # ==========================================================================
    
    # Enable sendfile for efficient file serving
    sendfile on;
    
    # Optimize sendfile packet size
    tcp_nopush on;
    tcp_nodelay on;
    
    # Keep-alive timeout for persistent connections
    keepalive_timeout 65;
    
    # Hash table size for types
    types_hash_max_size 2048;
    
    # Hide nginx version in error pages and headers
    server_tokens off;

    # ==========================================================================
    # Gzip Compression Configuration
    # ==========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ==========================================================================
    # Upstream Definition for Backend API
    # ==========================================================================
    upstream api_backend {
        server api:8080;
        keepalive 32;
    }

    # ==========================================================================
    # Main Server Block
    # ==========================================================================
    server {
        # Listen on port 80 for HTTP traffic
        listen 80;
        listen [::]:80;
        
        # Server name (localhost for container environment)
        server_name localhost;

        # Root directory for Angular SPA static files
        root /usr/share/nginx/html;
        
        # Default index file
        index index.html;

        # ======================================================================
        # Security Headers
        # ======================================================================
        
        # Prevent clickjacking attacks by disallowing iframe embedding
        add_header X-Frame-Options "SAMEORIGIN" always;
        
        # Prevent MIME type sniffing
        add_header X-Content-Type-Options "nosniff" always;
        
        # Enable XSS filtering in older browsers
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Referrer policy for privacy
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Permissions policy (formerly Feature-Policy)
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ======================================================================
        # Angular SPA Routing
        # ======================================================================
        # Serve index.html for all routes to enable client-side Angular routing
        # This allows Angular Router to handle navigation without 404 errors
        location / {
            try_files $uri $uri/ /index.html;
            
            # Cache control for HTML files - don't cache to ensure fresh deployments
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            
            # Security headers (must be repeated in location blocks)
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
        }

        # ======================================================================
        # API Proxy Configuration
        # ======================================================================
        # Proxy all /api/* requests to the ASP.NET Core 8 BFF backend
        location /api/ {
            # Proxy to backend API service
            proxy_pass http://api_backend/api/;
            
            # HTTP version for upstream connection
            proxy_http_version 1.1;
            
            # WebSocket support headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Forward original request headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Bypass cache for WebSocket and upgraded connections
            proxy_cache_bypass $http_upgrade;
            
            # Proxy timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            
            # Don't add security headers for API responses (let backend handle it)
        }

        # ======================================================================
        # Health Check Endpoint
        # ======================================================================
        # Simple health check endpoint for container orchestration
        # Returns HTTP 200 for load balancer and orchestrator health probes
        location /health {
            access_log off;
            return 200 "healthy\n";
            default_type text/plain;
        }

        # ======================================================================
        # Nginx Status Endpoint (Internal Only)
        # ======================================================================
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;  # Docker internal networks
            deny all;
        }

        # ======================================================================
        # Static Asset Caching
        # ======================================================================
        # Cache static assets aggressively since Angular CLI uses content hashing
        # File extensions: CSS, JavaScript, source maps, images, fonts
        location ~* \.(?:css|js|map|jpe?g|gif|png|ico|woff2?|ttf|eot|svg)$ {
            # Cache for 1 year (Angular CLI adds content hash to filenames)
            expires 1y;
            
            # Add immutable cache control for better performance
            add_header Cache-Control "public, immutable" always;
            
            # Access logging off for static assets to reduce log noise
            access_log off;
            
            # Security headers for static assets
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ======================================================================
        # JSON and Data Files
        # ======================================================================
        location ~* \.(?:json|xml)$ {
            # Short cache for JSON configuration files
            expires 1h;
            add_header Cache-Control "public" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ======================================================================
        # Deny Access to Hidden Files
        # ======================================================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ======================================================================
        # Error Pages
        # ======================================================================
        # Custom error page handling
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
